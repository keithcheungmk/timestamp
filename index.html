<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>時間戳印章編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --panel: #141416;
    --border: #242428;
    --accent: #f0a500;
    --accent2: #e04a1a;
    --text: #ddd8cc;
    --muted: #55544f;
    --input-bg: #0a0a0c;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 1100px;
    padding: 28px 32px 18px;
    display: flex;
    align-items: flex-end;
    gap: 18px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .logo-text h1 {
    font-size: 20px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-text p { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; margin-top: 2px; }

  /* ── Layout ── */
  .workspace {
    width: 100%; max-width: 1100px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    flex: 1;
  }

  /* ── Controls panel ── */
  .controls {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 24px;
    min-height: calc(100vh - 100px);
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Upload zone */
  .upload-zone {
    display: block;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--input-bg);
    -webkit-tap-highlight-color: rgba(240,165,0,0.15);
    user-select: none;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(240,165,0,0.04); }
  .upload-zone .icon { font-size: 32px; margin-bottom: 10px; }
  .upload-zone p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .upload-zone strong { color: var(--text); }
  #fileInput { display: none; }

  /* Inputs */
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; letter-spacing: 0.5px; }

  input[type="text"], input[type="datetime-local"], textarea, select {
    width: 100%; background: var(--input-bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px; padding: 9px 12px; outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  /* Toggle */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px;
  }
  .toggle {
    width: 40px; height: 22px; background: var(--border); border-radius: 11px;
    position: relative; cursor: pointer; transition: background 0.2s;
    border: none;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: ''; position: absolute;
    width: 16px; height: 16px; background: #fff; border-radius: 50%;
    top: 3px; left: 3px; transition: left 0.2s;
  }
  .toggle.on::after { left: 21px; }

  /* Color picker inline */
  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] {
    width: 36px; height: 36px; border-radius: 8px; padding: 2px;
    cursor: pointer; border: 1px solid var(--border); background: var(--input-bg);
    flex-shrink: 0;
  }

  /* Range */
  input[type="range"] {
    width: 100%; accent-color: var(--accent);
    background: transparent; border: none; padding: 0; height: 20px;
  }

  /* Action buttons */
  .btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    font-family: 'Noto Sans TC', sans-serif; font-weight: 700;
    font-size: 14px; cursor: pointer; letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-secondary {
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text);
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Canvas area ── */
  .canvas-area {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 32px 24px;
    background: #080808;
    gap: 16px;
  }
  .canvas-wrap {
    position: relative; max-width: 100%;
    box-shadow: 0 8px 60px rgba(0,0,0,0.8);
    border-radius: 4px; overflow: hidden;
    background: #111;
  }
  canvas { display: block; max-width: 100%; max-height: 70vh; }

  .drop-hint {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 700px; max-width: 100%; height: 420px;
    border: 1.5px dashed var(--border); border-radius: 16px;
    color: var(--muted); gap: 12px;
  }
  .drop-hint .big-icon { font-size: 56px; opacity: 0.3; }
  .drop-hint p { font-size: 14px; }

  /* Position selector grid */
  .pos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
  }
  .pos-btn {
    aspect-ratio: 1; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .pos-btn.active { background: rgba(240,165,0,0.2); border-color: var(--accent); }
  .pos-btn:hover:not(.active) { border-color: #444; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 800px) {
    .workspace { grid-template-columns: 1fr; }
    .controls { min-height: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">🕐</div>
  <div class="logo-text">
    <h1>時間戳印章編輯器</h1>
    <p>TIMESTAMP STAMP EDITOR</p>
  </div>
</header>

<div class="workspace">

  <!-- ── Controls ── -->
  <div class="controls">

    <!-- Upload -->
    <div>
      <div class="section-title">上載相片</div>
      <!-- Use <label for=> which is the most reliable iOS trigger -->
      <label for="fileInput" class="upload-zone" id="uploadZone">
        <div class="icon">📁</div>
        <p><strong>點擊 / 揀選相片</strong><br/>
        <span style="font-size:11px">JPG / PNG / WEBP</span></p>
      </label>
      <input type="file" id="fileInput" accept="image/*" style="
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        overflow: hidden;
        z-index: -1;
      "/>
      <!-- Fallback explicit button for iOS Chrome -->
      <button class="btn btn-secondary" style="margin-top:8px;font-size:15px;padding:11px"
        onclick="document.getElementById('fileInput').click()">
        📂 選擇相片 / Choose Photo
      </button>
    </div>

    <!-- Date / Time -->
    <div>
      <div class="section-title">日期與時間</div>
      <label>拍攝日期時間</label>
      <input type="datetime-local" id="datetimeInput" step="1"/>
      <div style="margin-top:8px" class="toggle-row">
        <span>使用現在時間</span>
        <button class="toggle on" id="nowToggle" onclick="toggleNow()"></button>
      </div>
      <div style="margin-top:8px">
        <label>時區標籤（如 GMT+8）</label>
        <input type="text" id="tzInput" value="GMT+8" style="width:120px"/>
      </div>
    </div>

    <!-- Address -->
    <div>
      <div class="section-title">地址</div>
      <label>每行一個地址部分（由大到小）</label>
      <textarea id="addressInput" rows="4" placeholder="中國香港特別行政區&#10;上水&#10;彩園路21號">中國香港特別行政區
上水
彩園路21號</textarea>
    </div>

    <!-- Style -->
    <div>
      <div class="section-title">印章樣式</div>

      <label>位置</label>
      <div class="pos-grid" id="posGrid">
        <button class="pos-btn" data-pos="top-left" onclick="setPos(this)"></button>
        <button class="pos-btn" data-pos="top-center" onclick="setPos(this)"></button>
        <button class="pos-btn active" data-pos="top-right" onclick="setPos(this)"></button>
        <button class="pos-btn" data-pos="mid-left" onclick="setPos(this)"></button>
        <button class="pos-btn" data-pos="mid-center" onclick="setPos(this)"></button>
        <button class="pos-btn" data-pos="mid-right" onclick="setPos(this)"></button>
        <button class="pos-btn" data-pos="bot-left" onclick="setPos(this)"></button>
        <button class="pos-btn" data-pos="bot-center" onclick="setPos(this)"></button>
        <button class="pos-btn" data-pos="bot-right" onclick="setPos(this)"></button>
      </div>

      <div style="margin-top:12px">
        <label>字體 / Font</label>
        <select id="fontSelect">
          <option value="Arial MT">Arial MT</option>
          <option value="Arial">Arial</option>
          <option value="Arial Black">Arial Black</option>
          <option value="Noto Sans TC">Noto Sans TC (中文)</option>
          <option value="Georgia">Georgia</option>
          <option value="Courier New">Courier New</option>
          <option value="Trebuchet MS">Trebuchet MS</option>
          <option value="Verdana">Verdana</option>
        </select>
      </div>

      <div style="margin-top:12px">
        <label>文字顏色 / Text Colour</label>
        <div class="color-row">
          <input type="color" id="textColor" value="#ffffff"/>
          <input type="text" id="textColorHex" value="#ffffff" style="width:90px"/>
        </div>
      </div>

      <div style="margin-top:12px">
        <label>文字透明度 / Text Opacity &nbsp;<span id="opacityVal">100</span>%</label>
        <input type="range" id="textOpacity" min="0" max="100" step="1" value="100"/>
      </div>

      <div style="margin-top:12px">
        <label>字體大小係數 <span id="sizeVal">4.1</span>%</label>
        <input type="range" id="fontSize" min="1.2" max="5" step="0.1" value="4.1"/>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:auto">
      <button class="btn btn-primary" id="renderBtn" onclick="renderStamp()" disabled>套用印章</button>
      <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()" disabled>⬇ 下載圖片</button>
    </div>

  </div>

  <!-- ── Canvas area ── -->
  <div class="canvas-area" id="canvasArea">
    <div class="drop-hint" id="dropHint">
      <div class="big-icon">🖼️</div>
      <p>先上載相片，再套用時間戳印章</p>
    </div>
    <div class="canvas-wrap" id="canvasWrap" style="display:none">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

</div>

<script>
  let loadedImage = null;
  let stampPosition = "top-right";
  let useNow = true;

  // ── Datetime init ──
  function setNowDatetime() {
    const now = new Date();
    const pad = n => String(n).padStart(2,"0");
    const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById("datetimeInput").value = local;
  }
  setNowDatetime();

  function toggleNow() {
    useNow = !useNow;
    const btn = document.getElementById("nowToggle");
    btn.classList.toggle("on", useNow);
    document.getElementById("datetimeInput").disabled = useNow;
    if (useNow) setNowDatetime();
  }
  document.getElementById("datetimeInput").disabled = true;

  // ── File upload ──
  const uploadZone = document.getElementById("uploadZone");
  const fileInput = document.getElementById("fileInput");

  fileInput.addEventListener("change", e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

  // Drag and drop (desktop only)
  uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.style.borderColor = "var(--accent)"; });
  uploadZone.addEventListener("dragleave", () => uploadZone.style.borderColor = "");
  uploadZone.addEventListener("drop", e => {
    e.preventDefault(); uploadZone.style.borderColor = "";
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  // Touch feedback
  uploadZone.addEventListener("touchstart", () => uploadZone.style.borderColor = "var(--accent)", {passive:true});
  uploadZone.addEventListener("touchend", () => setTimeout(() => uploadZone.style.borderColor = "", 300), {passive:true});

  function loadFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        loadedImage = img;
        document.getElementById("dropHint").style.display = "none";
        document.getElementById("canvasWrap").style.display = "block";
        document.getElementById("renderBtn").disabled = false;
        drawImageOnly();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);

    // Try to read EXIF date from JPEG
    if (file.type === "image/jpeg") tryReadExif(file);
  }

  function tryReadExif(file) {
    // Simple EXIF datetime extraction (DateTimeOriginal tag)
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const buf = new Uint8Array(e.target.result);
        const str = new TextDecoder("ascii", {fatal:false}).decode(buf);
        const match = str.match(/(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
        if (match && !useNow) {
          const [,y,mo,d,h,mi,s] = match;
          document.getElementById("datetimeInput").value = `${y}-${mo}-${d}T${h}:${mi}:${s}`;
        }
      } catch(_) {}
    };
    reader.readAsArrayBuffer(file.slice(0, 65536));
  }

  function drawImageOnly() {
    if (!loadedImage) return;
    const canvas = document.getElementById("mainCanvas");
    canvas.width = loadedImage.naturalWidth;
    canvas.height = loadedImage.naturalHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(loadedImage, 0, 0);
  }

  // ── Position selector ──
  function setPos(btn) {
    document.querySelectorAll(".pos-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    stampPosition = btn.dataset.pos;
  }

  // ── Range labels ──
  document.getElementById("fontSize").addEventListener("input", function() {
    document.getElementById("sizeVal").textContent = this.value;
  });
  document.getElementById("textOpacity").addEventListener("input", function() {
    document.getElementById("opacityVal").textContent = this.value;
  });

  // ── Color sync ──
  document.getElementById("textColor").addEventListener("input", function() {
    document.getElementById("textColorHex").value = this.value;
  });
  document.getElementById("textColorHex").addEventListener("input", function() {
    if (/^#[0-9a-fA-F]{6}$/.test(this.value))
      document.getElementById("textColor").value = this.value;
  });

  // ── Chinese date format ──
  function formatChinese(date, tz) {
    const y = date.getFullYear();
    const mo = date.getMonth()+1;
    const d = date.getDate();
    const h = date.getHours();
    const mi = String(date.getMinutes()).padStart(2,"0");
    const s = String(date.getSeconds()).padStart(2,"0");
    const ampm = h >= 12 ? "下午" : "上午";
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return `${y}年${mo}月${d}日 ${ampm}${h12}:${mi}:${s} [${tz}]`;
  }

  // ── Render stamp ──
  function renderStamp() {
    if (!loadedImage) return;

    if (useNow) setNowDatetime();

    const canvas = document.getElementById("mainCanvas");
    canvas.width = loadedImage.naturalWidth;
    canvas.height = loadedImage.naturalHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(loadedImage, 0, 0);

    const W = canvas.width;
    const H = canvas.height;

    // Settings
    const fontSizePct = parseFloat(document.getElementById("fontSize").value) / 100;
    const fontSize = Math.round(W * fontSizePct);
    const fontSizeLarge = Math.round(fontSize * 1.05);
    const lineHTime = fontSizeLarge * 1.05;   // tighter time line spacing
    const lineHAddr = fontSize * 1.02;          // very tight address line spacing
    const textColorVal = document.getElementById("textColor").value;
    const textOpacity = parseInt(document.getElementById("textOpacity").value) / 100;
    const selectedFont = document.getElementById("fontSelect").value;
    const tzLabel = document.getElementById("tzInput").value.trim() || "GMT+8";

    const dtInput = document.getElementById("datetimeInput").value;
    const date = dtInput ? new Date(dtInput) : new Date();
    const timeStr = formatChinese(date, tzLabel);

    const addressRaw = document.getElementById("addressInput").value;
    const addrLines = addressRaw.split("\n").map(l => l.trim()).filter(Boolean);

    // Each line: plain address lines use fontSize; time lines split label vs value
    // type: "split" = label drawn bigger + value drawn normal on same line
    // type: "plain" = single text at fontSize
    const stampLines = [
      { type: "split", label: "網絡:", value: timeStr, lineH: lineHTime },
      { type: "split", label: "本地:", value: timeStr, lineH: lineHTime },
      ...addrLines.map(l => ({ type: "plain", text: l, lineH: lineHAddr })),
    ];

    // Calculate total height using per-line heights
    const totalH = stampLines.reduce((sum, l) => sum + l.lineH, 0);

    const padX = fontSize * 1.2;
    const padY = fontSize * 1.2;

    // Determine anchor
    const pos = stampPosition;
    const isRight = pos.includes("right");
    const isCenter = pos.includes("center") && !pos.includes("left") && !pos.includes("right");
    const isTop = pos.includes("top");
    const isMid = pos.includes("mid");

    let startX, startY;

    if (isRight) startX = W - padX;
    else if (isCenter) startX = W / 2;
    else startX = padX;

    if (isTop) startY = padY;
    else if (isMid) startY = H / 2 - totalH / 2;
    else startY = H - totalH - padY;

    ctx.textBaseline = "top";

    // Convert hex colour to rgba with opacity
    const r = parseInt(textColorVal.slice(1,3),16);
    const g = parseInt(textColorVal.slice(3,5),16);
    const b = parseInt(textColorVal.slice(5,7),16);

    // Helper: draw a single piece of text with stroke+shadow+fill
    function drawText(text, x, y, fs) {
      ctx.font = `normal ${fs}px "${selectedFont}", "Arial MT", Arial, sans-serif`;
      ctx.textAlign = "left";
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      // Step 1: pure black bottom layer — offset right+UP
      // light from bottom-left = shadow falls top-right
      const offset = fs * 0.02;
      ctx.fillStyle = `rgba(0,0,0,${textOpacity})`;
      ctx.fillText(text, x + offset, y - offset);

      // Step 2: pure white top layer — covers most of black layer
      ctx.fillStyle = `rgba(${r},${g},${b},${textOpacity})`;
      ctx.fillText(text, x, y);
    }

    // Force left-align for all manual positioning
    ctx.textAlign = "left";

    let currentY = startY;
    stampLines.forEach((line) => {
      const y = currentY;
      currentY += line.lineH;

      if (line.type === "split") {
        // Measure both parts with their respective font sizes
        ctx.font = `normal ${fontSizeLarge}px "${selectedFont}", "Arial MT", Arial, sans-serif`;
        const labelW = ctx.measureText(line.label).width;
        ctx.font = `normal ${fontSize}px "${selectedFont}", "Arial MT", Arial, sans-serif`;
        const valueW = ctx.measureText(line.value).width;
        const totalW = labelW + valueW;

        // Calculate left edge of the whole line based on alignment
        let lineStartX;
        if (isRight) lineStartX = startX - totalW;
        else if (isCenter) lineStartX = startX - totalW / 2;
        else lineStartX = startX;

        const labelX = lineStartX;
        const valueX = lineStartX + labelW;
        // Vertically centre the larger label text with the value text
        const labelY = y + (fontSize - fontSizeLarge) / 2;

        drawText(line.label, labelX, labelY, fontSizeLarge);
        drawText(line.value, valueX, y, fontSize);

      } else {
        // Plain address line — calculate left edge based on alignment
        let lineStartX;
        if (isRight) {
          ctx.font = `normal ${fontSize}px "${selectedFont}", "Arial MT", Arial, sans-serif`;
          const tw = ctx.measureText(line.text).width;
          lineStartX = startX - tw;
        } else if (isCenter) {
          ctx.font = `normal ${fontSize}px "${selectedFont}", "Arial MT", Arial, sans-serif`;
          const tw = ctx.measureText(line.text).width;
          lineStartX = startX - tw / 2;
        } else {
          lineStartX = startX;
        }
        drawText(line.text, lineStartX, y, fontSize);
      }
    });

    // Reset
    ctx.shadowBlur = 0;
    ctx.textAlign = "left";

    document.getElementById("downloadBtn").disabled = false;
  }

  // ── Download ──
  function downloadImage() {
    const canvas = document.getElementById("mainCanvas");
    const dataUrl = canvas.toDataURL("image/jpeg", 0.97);

    // Try standard download (works on desktop Chrome)
    const link = document.createElement("a");
    link.download = `stamped_${Date.now()}.jpg`;
    link.href = dataUrl;

    // iOS Safari doesn't support link.click() download — open in new tab instead
    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      const newTab = window.open();
      newTab.document.write(`
        <html><body style="margin:0;background:#000;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px">
        <p style="color:#fff;font-family:sans-serif;font-size:14px">長按圖片 → 儲存至相簿<br>Long-press image → Save to Photos</p>
        <img src="${dataUrl}" style="max-width:100%;border-radius:4px"/>
        </body></html>
      `);
      newTab.document.close();
    } else {
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  }

  // Live preview on input changes (re-render if image loaded)
  ["addressInput","datetimeInput","tzInput","textColor","fontSize","textOpacity","fontSelect"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
      if (loadedImage && !document.getElementById("renderBtn").disabled) renderStamp();
    });
  });
  document.querySelectorAll(".pos-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (loadedImage) renderStamp();
    });
  });
</script>
</body>
</html>
